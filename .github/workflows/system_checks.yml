name: System Reliability Checks

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  reliability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov fastapi httpx

      - name: Run unit tests
        run: pytest -q --ignore=tests/api --ignore=tests/reliability --cov=. --cov-report=xml:coverage_report.xml

      - name: Run API tests
        run: pytest -q tests/api

      - name: Run reliability tests
        run: pytest -q tests/reliability

      - name: Run stress tests
        run: |
          python stress_test.py > stress_report.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("stress_report.json").read_text())
          failures = []
          if report.get("failure_rate", 1.0) > 0:
            failures.append(f"failure_rate={report['failure_rate']}")
          if report.get("queue_depth", 1) != 0:
            failures.append(f"queue_depth={report['queue_depth']}")

          if failures:
            raise SystemExit("Stress test gate failed: " + ", ".join(failures))
          PY

      - name: Run system audits
        run: python -m system_audit.audit_runner > audit_report.json

      - name: Block audit regressions
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("audit_report.json").read_text())
          if report.get("overall_status") != "OK":
            raise SystemExit(f"Audit regression detected: {report.get('overall_status')}")
          PY

      - name: Run chaos tests
        if: github.event_name == 'schedule'
        run: pytest -q tests/chaos

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-reports
          path: |
            audit_report.json
            stress_report.json
            coverage_report.xml
          if-no-files-found: error
